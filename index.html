<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ЦАРЬ-ВИКТОРИНА ⚜️ Николай II</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
    }

    :root {
      --font-scale: 100%;
    }

    body {
      background: #2b1e0f;
      background-image: radial-gradient(circle at 30% 40%, #4a3724 0%, #1f140a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-size: var(--font-scale);
    }

    /* королевский контейнер */
    .royal-chest {
      max-width: 1200px;
      width: 100%;
      background: #fef7e0;
      background: linear-gradient(145deg, #fcf3d9 0%, #ecdcc0 100%);
      border: 8px double #c5a267;
      border-radius: 36px 36px 30px 30px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.6), 0 0 0 3px #7a5c3a inset, 0 0 0 6px #b5946b inset;
      padding: 25px 15px 30px 15px;
      position: relative;
      font-size: calc(1rem * var(--font-scale) / 100);
    }

    /* гербовая лента */
    .royal-chest::before {
      content: "⚜️ ПО ВЫСОЧАЙШЕМУ ПОВЕЛЕНИЮ ⚜️";
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: #b4823b;
      color: #fee9b0;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 40px;
      border: 2px solid #efd48f;
      box-shadow: 0 4px 0 #5e3e1f, 0 8px 15px rgba(0,0,0,0.3);
      text-shadow: 1px 1px 0 #4f3219;
      white-space: nowrap;
      z-index: 10;
    }

    /* шапка */
    .tsar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 5px 0 15px 0;
      border-bottom: 2px solid #b8864b;
      padding-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .title-group h1 {
      font-size: 28px;
      color: #2d1f0c;
      text-shadow: 2px 2px 0 #bd9b68, 4px 4px 0 rgba(0,0,0,0.1);
      font-weight: 800;
      letter-spacing: 1px;
    }
    .crown {
      font-size: 32px;
      filter: drop-shadow(2px 4px 0 #8b691b);
    }

    /* кнопка настроек */
    .settings-btn {
      background: #b6853b;
      border: 2px solid #efcd8a;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 3px 0 #5f3d17;
      transition: 0.07s;
      color: #251d0e;
      font-weight: bold;
    }

    /* модалка настроек */
    .settings-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 15px;
    }
    .settings-card {
      background: #fcf3d9;
      border: 6px double #c5a267;
      border-radius: 40px;
      padding: 25px 20px;
      box-shadow: 0 20px 30px black;
      max-width: 400px;
      width: 100%;
    }
    .settings-card h2 {
      font-size: 28px;
      color: #2d1f0c;
      border-bottom: 2px solid #b8864b;
      padding-bottom: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    .font-controls {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .font-btn {
      background: #b6853b;
      border: 2px solid #efcd8a;
      border-radius: 50px;
      padding: 12px 25px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 #5f3d17;
    }
    .close-settings {
      background: #7a5629;
      color: #fef7e0;
      border: none;
      font-size: 22px;
      padding: 12px 20px;
      border-radius: 50px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }

    /* экран ввода имени */
    .name-screen {
      text-align: center;
      padding: 20px 10px;
    }
    .name-screen h2 {
      font-size: 32px;
      color: #2d1f0c;
      margin-bottom: 20px;
    }
    .name-input {
      background: #f5e9d3;
      border: 3px solid #bb8f4f;
      border-radius: 50px;
      padding: 15px 20px;
      font-size: 20px;
      width: 100%;
      max-width: 400px;
      margin: 15px auto;
      display: block;
    }
    .name-btn {
      background: #b6853b;
      border: 2px solid #efcd8a;
      border-radius: 50px;
      padding: 15px 40px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #5f3d17;
      margin-top: 15px;
    }

    /* сетка вопросов */
    .quiz-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin: 20px 0 15px;
    }
    .card {
      background: #f5e9d3;
      border: 2px solid #bb8f4f;
      border-radius: 25px 10px 25px 10px;
      box-shadow: 5px 5px 0 #7a5629, 0 8px 15px rgba(0,0,0,0.2);
      padding: 15px 12px;
    }
    .question-text {
      font-size: 18px;
      font-weight: 700;
      color: #331d0b;
      margin-bottom: 12px;
      border-left: 5px solid #c99f62;
      padding-left: 10px;
      line-height: 1.3;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }
    .answer-option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(245, 235, 200, 0.7);
      border: 1.5px solid #ba8c4a;
      border-radius: 40px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
      color: #2b1b0a;
    }
    input[type="radio"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #77572d;
      border-radius: 50%;
      background: #fcf3de;
      flex-shrink: 0;
    }
    input[type="radio"]:checked {
      background: #b47d42;
      border: 2px solid #fff0bb;
      box-shadow: 0 0 0 2px #aa7b3c;
    }

    /* финальный экран */
    .result-screen {
      text-align: center;
      padding: 15px 5px;
    }
    .result-title {
      font-size: 28px;
      color: #2d1f0c;
      margin-bottom: 20px;
    }
    .result-stats {
      background: #2f2417;
      color: #f9e7c1;
      border-radius: 40px;
      padding: 20px 15px;
      font-size: 22px;
      margin: 20px 0;
    }
    .result-message {
      font-size: 24px;
      background: #b6853b;
      border-radius: 40px;
      padding: 20px 15px;
      margin: 20px 0;
      border: 3px solid #efcd8a;
    }
    .restart-btn {
      background: #b6853b;
      border: 2px solid #efcd8a;
      border-radius: 50px;
      padding: 15px 30px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 0 #5f3d17;
    }

    /* счетчик */
    .score-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2f2417;
      border: 2px ridge #ebc274;
      border-radius: 40px;
      padding: 10px 18px;
      margin-top: 15px;
      color: #f9e7c1;
      gap: 10px;
    }
    .score-text {
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }
    .check-btn {
      background: #b6853b;
      border: 2px solid #efcd8a;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 0 #5f3d17;
      white-space: nowrap;
    }

    /* детальные результаты */
    .result-detail-card {
      margin: 12px 0;
      padding: 15px;
      background: #f5e9d3;
      border-radius: 20px;
      border: 2px solid #bb8f4f;
      font-size: 16px;
      text-align: left;
    }
    .result-detail-card b {
      font-size: 17px;
      display: block;
      margin-bottom: 5px;
    }
    .result-detail-card i {
      display: block;
      margin-top: 6px;
      color: #4a2e12;
      font-size: 15px;
    }

    /* планшеты */
    @media (min-width: 768px) {
      .quiz-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      .question-text {
        font-size: 20px;
      }
      .answer-option {
        font-size: 18px;
      }
      .title-group h1 {
        font-size: 42px;
      }
    }

    /* маленькие телефоны */
    @media (max-width: 380px) {
      .score-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .check-btn {
        width: 100%;
        text-align: center;
      }
      .score-text {
        text-align: center;
      }
      .question-text {
        font-size: 16px;
      }
      .answer-option {
        font-size: 14px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
<div class="royal-chest" id="royalChest">
  <div class="tsar-header">
    <div class="title-group">
      <span class="crown">👑</span>
      <h1 id="mainTitle">НИКОЛАЙ II</h1>
      <span class="crown">⚜️</span>
    </div>
    <div class="settings-btn" id="settingsBtn">⚙️</div>
  </div>

  <!-- сюда будем подгружать экраны -->
  <div id="appContent"></div>
</div>

<!-- модалка настроек (скрыта по умолчанию) -->
<div id="settingsModal" class="settings-modal" style="display: none;">
  <div class="settings-card">
    <h2>НАСТРОЙКИ</h2>
    <div class="font-controls">
      <button class="font-btn" id="fontMinus">A-</button>
      <button class="font-btn" id="fontPlus">A+</button>
    </div>
    <button class="close-settings" id="closeSettings">ЗАКРЫТЬ</button>
  </div>
</div>

<script>
  (function() {
    // ОБНОВЛЕННЫЕ данные вопросов (ровно 20 штук, как в твоем списке)
    const questionsData = [
      { 
        q: "I) Как называли Николая II в детстве?", 
        options: ["Коля", "Николаша", "Ники", "Микола"], 
        correct: 2, 
        explanation: "В семье его звали именно Ники! По-английски Nicky, по-французски Nicky." 
      },
      { 
        q: "II) Какого роста был император Николай II?", 
        options: ["200 см", "185 см", "158 см", "170 см"], 
        correct: 3, 
        explanation: "Рост Николая II был около 170 см — невысокий, но статный." 
      },
      { 
        q: "III) Какая порода собак жила в семье Николая II?", 
        options: ["Корги", "Мопс", "Хаски", "Такса"], 
        correct: 0, 
        explanation: "У них жили корги! Императрица очень любила этих собак." 
      },
      { 
        q: "IV) Что подарил Николай II будущей невесте?", 
        options: ["Кольцо", "Колье", "Брошь", "Браслет"], 
        correct: 0, 
        explanation: "Он подарил ей обручальное кольцо с розовым жемчугом." 
      },
      { 
        q: "V) Что любил кушать император Николай II?", 
        options: ["Доширак", "Греча с котлетой", "Картофель фри", "Суши"], 
        correct: 1, 
        explanation: "Царь любил простую пищу: гречку с котлетой и щи." 
      },
      { 
        q: "VI) Какая татуировка была на руке Николая?", 
        options: ["Дракон", "Портрет невесты", "Герб России", "Портрет Путина"], 
        correct: 0, 
        explanation: "В Японии ему набили дракона на правой руке. Было модно!" 
      },
      { 
        q: "VII) Какой транспорт предпочитал Николай II?", 
        options: ["Метро", "Поезд", "Лошадь Пржевальского", "Автомобиль Студебеккер"], 
        correct: 1, 
        explanation: "Императорский поезд — его любимый способ передвижения." 
      },
      { 
        q: "VIII) Какую музыку любил Николай II?", 
        options: ["Шансон", "Рэп", "Русскую народную", "Классику"], 
        correct: 3, 
        explanation: "Обожал Чайковского и оперу. Сам играл на фортепиано." 
      },
      { 
        q: "IX) Кто был лучшим другом семьи императора?", 
        options: ["Столыпин", "Витте", "Распутин", "Киркоров"], 
        correct: 2, 
        explanation: "Григорий Распутин — загадочная фигура, близкий к царской семье." 
      },
      { 
        q: "X) За что Николай II получил никнейм 'Миротворец'?", 
        options: ["Мирил супругов", "Мирил гусаров", "Мирил собак", "Мирил государства"], 
        correct: 3, 
        explanation: "Инициировал Гаагские конференции по разоружению. Хотел мира во всем мире!" 
      },
      { 
        q: "XI) Сколько детей было в семье императора?", 
        options: ["Четыре девочки и мальчик (5)", "Четыре мальчика и две девочки (6)", "Три девочки и три мальчика (6)", "Пять девочек и пять мальчиков (10)"], 
        correct: 0, 
        explanation: "Ольга, Татьяна, Мария, Анастасия и цесаревич Алексей." 
      },
      { 
        q: "XII) Где проводила лето семья Николая?", 
        options: ["На Мальдивах", "В Ливадии (Крым)", "В Турции", "В Китае"], 
        correct: 1, 
        explanation: "Ливадийский дворец в Крыму — любимое место отдыха." 
      },
      { 
        q: "XIII) Какое воинское звание было у Николая II?", 
        options: ["Генерал", "Маршал", "Мичман", "Полковник"], 
        correct: 3, 
        explanation: "Он был полковником. Сам себя не повышал, скромняга!" 
      },
      { 
        q: "XIV) Что больше всего любил Николай II?", 
        options: ["Работу", "Семью", "Власть", "Конфеты"], 
        correct: 1, 
        explanation: "Семья была для него всем. Примерный семьянин." 
      },
      { 
        q: "XV) Какое было увлечение у Николая II?", 
        options: ["Игра в карты", "Рубка дров", "Спорт", "Скачки на лошадях"], 
        correct: 1, 
        explanation: "Обожал физический труд — мог выйти и нарубить дров." 
      },
      { 
        q: "XVI) Что коллекционировал Николай II?", 
        options: ["Фотографии", "Картины", "Оружие", "Фуражки"], 
        correct: 0, 
        explanation: "Страсть к фотографии — снимал семью, пейзажи, всё подряд." 
      },
      { 
        q: "XVII) Почему Николай решил начать войну?", 
        options: ["Не любил немцев", "Защищал сербов", "Его заставили", "Хотел воевать"], 
        correct: 1, 
        explanation: "Россия вступила в Первую мировую, защищая Сербию." 
      },
      { 
        q: "XVIII) Как Николай II относился к спорту?", 
        options: ["Болел за 'Спартак'", "Не любил спорт", "Играл в теннис", "Играл в шашки"], 
        correct: 2, 
        explanation: "Теннис был его страстью! И гребля, и верховая езда." 
      },
      { 
        q: "XIX) Девиз семьи императора?", 
        options: ["Один за всех и все за одного", "Преданность долгу", "Народ и партия едины", "Моя хата с краю"], 
        correct: 0, 
        explanation: "Дюма, 'Три мушкетера' — но они реально жили этим принципом." 
      },
      { 
        q: "XX) Кто написал самый знаменитый портрет императора Николая II?", 
        options: ["Серов", "Суриков", "Куинджи", "Малевич"], 
        correct: 0, 
        explanation: "Валентин Серов. Тот самый портрет в тужурке, очень известный." 
      }
    ];

    let userName = '';
    let userAnswers = new Array(20).fill(null);
    let fontSize = 100;

    const app = document.getElementById('appContent');
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettings = document.getElementById('closeSettings');
    const fontPlus = document.getElementById('fontPlus');
    const fontMinus = document.getElementById('fontMinus');
    const root = document.documentElement;

    function changeFontSize(delta) {
      fontSize = Math.min(150, Math.max(70, fontSize + delta));
      root.style.setProperty('--font-scale', fontSize + '%');
    }
    
    fontPlus.addEventListener('click', () => changeFontSize(10));
    fontMinus.addEventListener('click', () => changeFontSize(-10));
    settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
    closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');
    window.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.style.display = 'none';
    });

    function showNameScreen() {
      app.innerHTML = `
        <div class="name-screen">
          <h2>⚜️ ПРЕДСТАВЬТЕСЬ ⚜️</h2>
          <input type="text" id="userNameInput" class="name-input" placeholder="Ваше имя" autocomplete="off">
          <button class="name-btn" id="startQuizBtn">ВОЙТИ</button>
        </div>
      `;
      document.getElementById('startQuizBtn').addEventListener('click', () => {
        const name = document.getElementById('userNameInput').value.trim();
        if (name) {
          userName = name;
          showQuiz();
        } else {
          alert('Царь требует имя!');
        }
      });
    }

    function showQuiz() {
      userAnswers = new Array(20).fill(null);
      renderQuizGrid();
    }

    function renderQuizGrid() {
      let html = `<div class="quiz-grid">`;
      for (let i = 0; i < questionsData.length; i++) {
        const q = questionsData[i];
        html += `<div class="card" data-qidx="${i}">`;
        html += `<div class="question-text">${q.q}</div>`;
        html += `<div class="answers">`;
        for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
          const checked = (userAnswers[i] === optIdx) ? 'checked' : '';
          html += `
            <label class="answer-option">
              <input type="radio" name="q${i}" value="${optIdx}" ${checked} data-q="${i}" data-opt="${optIdx}">
              <span>${q.options[optIdx]}</span>
            </label>
          `;
        }
        html += `</div></div>`;
      }
      html += `</div>`;
      html += `<div class="score-panel"><div class="score-text">⚜️ ОТВЕЧЕНО: ${userAnswers.filter(a => a !== null).length}/20</div><button class="check-btn" id="showResultsBtn">⚜️ ИТОГИ</button></div>`;
      app.innerHTML = html;

      document.querySelectorAll('input[type=radio]').forEach(radio => {
        radio.addEventListener('change', function(e) {
          const qIdx = parseInt(this.dataset.q);
          const optIdx = parseInt(this.dataset.opt);
          userAnswers[qIdx] = optIdx;
          document.querySelector('.score-text').innerHTML = `⚜️ ОТВЕЧЕНО: ${userAnswers.filter(a => a !== null).length}/20`;
        });
      });

      document.getElementById('showResultsBtn').addEventListener('click', showResults);
    }

    function showResults() {
      const answered = userAnswers.filter(a => a !== null).length;
      if (answered < 20) {
        alert(`Ответь на все вопросы, ${userName}! Осталось ${20 - answered}`);
        return;
      }

      let correctCount = 0;
      let resultsHTML = `<div class="result-screen"><h2 class="result-title">⚜️ ВЕРДИКТ, ${userName} ⚜️</h2>`;

      for (let i = 0; i < questionsData.length; i++) {
        const q = questionsData[i];
        const userAns = userAnswers[i];
        const isCorrect = (userAns === q.correct);
        if (isCorrect) correctCount++;
        
        // Римские цифры для красоты
        const roman = (i + 1) + ")";
        
        resultsHTML += `<div class="result-detail-card">
          <b>${roman} ${q.q}</b>
          <div style="margin: 8px 0">
            ${isCorrect ? '✅' : '❌'} Ты выбрал: ${q.options[userAns]}<br>
            ⚜️ Правильно: ${q.options[q.correct]}
          </div>
          <i>💬 ${q.explanation}</i>
        </div>`;
      }

      const percent = (correctCount / 20) * 100;
      let finalMessage = percent >= 90 
        ? `👑 ${userName}, Николай Второй дружил бы с вами! 👑` 
        : `⚜️ ${userName}, ты неплохо знаешь царя, но есть нюансы...`;

      resultsHTML += `<div class="result-stats">✅ Правильных: ${correctCount}/20 (${Math.round(percent)}%)</div>`;
      resultsHTML += `<div class="result-message">${finalMessage}</div>`;
      resultsHTML += `<button class="restart-btn" id="restartBtn">⚜️ ЗАНОВО ⚜️</button>`;
      resultsHTML += `</div>`;

      app.innerHTML = resultsHTML;
      document.getElementById('restartBtn').addEventListener('click', () => {
        userName = '';
        showNameScreen();
      });
    }

    showNameScreen();
  })();
</script>
</body>
</html>
