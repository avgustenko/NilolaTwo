<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>ЦАРЬ-ВИКТОРИНА ⚜️ Николай II</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
    }

    :root {
      --font-scale: 100%;
    }

    body {
      background: #2b1e0f;
      background-image: radial-gradient(circle at 30% 40%, #4a3724 0%, #1f140a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-size: var(--font-scale);
    }

    /* королевский контейнер */
    .royal-chest {
      max-width: 1200px;
      width: 100%;
      background: #fef7e0;
      background: linear-gradient(145deg, #fcf3d9 0%, #ecdcc0 100%);
      border: 12px double #c5a267;
      border-radius: 48px 48px 36px 36px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.6), 0 0 0 4px #7a5c3a inset, 0 0 0 8px #b5946b inset;
      padding: 30px 25px 40px 25px;
      position: relative;
      font-size: calc(1rem * var(--font-scale) / 100);
    }

    /* гербовая лента */
    .royal-chest::before {
      content: "⚜️ ПО ВЫСОЧАЙШЕМУ ПОВЕЛЕНИЮ ⚜️";
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: #b4823b;
      color: #fee9b0;
      font-size: clamp(14px, 4vw, 22px);
      font-weight: bold;
      letter-spacing: 3px;
      padding: 10px 30px;
      border-radius: 60px;
      border: 2px solid #efd48f;
      box-shadow: 0 6px 0 #5e3e1f, 0 10px 20px rgba(0,0,0,0.3);
      text-shadow: 2px 2px 0 #4f3219;
      white-space: nowrap;
      z-index: 10;
    }
    @media (max-width: 550px) {
      .royal-chest::before {
        white-space: normal;
        text-align: center;
        line-height: 1.3;
        padding: 6px 18px;
        top: -28px;
        width: 90%;
        font-size: 16px;
      }
      .royal-chest {
        margin-top: 25px;
        padding-top: 40px;
      }
    }

    /* шапка */
    .tsar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0 20px 0;
      border-bottom: 3px solid #b8864b;
      padding-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .title-group h1 {
      font-size: clamp(28px, 7vw, 52px);
      color: #2d1f0c;
      text-shadow: 3px 3px 0 #bd9b68, 6px 6px 0 rgba(0,0,0,0.1);
      font-weight: 800;
      letter-spacing: 2px;
    }
    .crown {
      font-size: 48px;
      filter: drop-shadow(2px 6px 0 #8b691b);
    }

    /* кнопка настроек */
    .settings-btn {
      background: #b6853b;
      border: 3px solid #efcd8a;
      border-radius: 50px;
      padding: 10px 25px;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #5f3d17;
      transition: 0.07s;
      color: #251d0e;
      font-weight: bold;
    }
    .settings-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #5f3d17;
    }

    /* модалка настроек */
    .settings-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .settings-card {
      background: #fcf3d9;
      border: 8px double #c5a267;
      border-radius: 60px;
      padding: 40px;
      box-shadow: 0 20px 30px black;
      max-width: 500px;
      width: 90%;
      font-size: calc(1.2rem * var(--font-scale) / 100);
    }
    .settings-card h2 {
      font-size: 2.5rem;
      color: #2d1f0c;
      border-bottom: 3px solid #b8864b;
      padding-bottom: 10px;
      margin-bottom: 30px;
      text-align: center;
    }
    .font-controls {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .font-btn {
      background: #b6853b;
      border: 3px solid #efcd8a;
      border-radius: 60px;
      padding: 15px 30px;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #5f3d17;
      transition: 0.07s;
    }
    .font-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #5f3d17;
    }
    .close-settings {
      background: #7a5629;
      color: #fef7e0;
      border: none;
      font-size: 1.8rem;
      padding: 15px 30px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }

    /* экран ввода имени */
    .name-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .name-screen h2 {
      font-size: 2.8rem;
      color: #2d1f0c;
      margin-bottom: 30px;
    }
    .name-input {
      background: #f5e9d3;
      border: 4px solid #bb8f4f;
      border-radius: 60px;
      padding: 20px 30px;
      font-size: 1.8rem;
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      display: block;
      text-align: center;
    }
    .name-btn {
      background: #b6853b;
      border: 3px solid #efcd8a;
      border-radius: 60px;
      padding: 20px 50px;
      font-size: 2.2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 0 #5f3d17;
      margin-top: 20px;
    }

    /* сетка вопросов */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      margin: 35px 0 20px;
    }
    .card {
      background: #f5e9d3;
      background: linear-gradient(145deg, #faf0db, #eddbbd);
      border: 3px solid #bb8f4f;
      border-radius: 35px 15px 35px 15px;
      box-shadow: 8px 8px 0 #7a5629, 0 10px 20px rgba(0,0,0,0.3);
      padding: 18px 16px 18px 20px;
      transition: 0.15s;
    }
    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #331d0b;
      margin-bottom: 14px;
      border-left: 7px solid #c99f62;
      padding-left: 14px;
      line-height: 1.3;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .answer-option {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(245, 235, 200, 0.7);
      border: 2px solid #ba8c4a;
      border-radius: 60px;
      padding: 8px 15px 8px 12px;
      cursor: pointer;
      font-size: 1.2rem;
      color: #2b1b0a;
    }
    input[type="radio"] {
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #77572d;
      border-radius: 50%;
      background: #fcf3de;
    }
    input[type="radio"]:checked {
      background: #b47d42;
      border: 3px solid #fff0bb;
      box-shadow: 0 0 0 2px #aa7b3c;
    }

    /* финальный экран */
    .result-screen {
      text-align: center;
      padding: 30px;
    }
    .result-title {
      font-size: 3rem;
      color: #2d1f0c;
      margin-bottom: 30px;
    }
    .result-stats {
      background: #2f2417;
      color: #f9e7c1;
      border-radius: 60px;
      padding: 30px;
      font-size: 2rem;
      margin: 30px 0;
    }
    .result-message {
      font-size: 2.2rem;
      background: #b6853b;
      border-radius: 60px;
      padding: 30px;
      margin: 30px 0;
      border: 4px solid #efcd8a;
    }
    .restart-btn {
      background: #b6853b;
      border: 3px solid #efcd8a;
      border-radius: 60px;
      padding: 20px 50px;
      font-size: 2rem;
      cursor: pointer;
      box-shadow: 0 8px 0 #5f3d17;
    }

    /* счетчик */
    .score-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2f2417;
      border: 3px ridge #ebc274;
      border-radius: 60px;
      padding: 14px 25px;
      margin-top: 25px;
      color: #f9e7c1;
      flex-wrap: wrap;
    }
    .score-text {
      font-size: 1.8rem;
      font-weight: bold;
    }
    .check-btn {
      background: #b6853b;
      border: 3px solid #efcd8a;
      border-radius: 50px;
      padding: 12px 35px;
      font-size: 1.8rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #5f3d17;
    }

    /* детальные результаты */
    .result-detail-card {
      margin: 15px;
      padding: 20px;
      background: #f5e9d3;
      border-radius: 30px;
      border: 2px solid #bb8f4f;
      font-size: 1.2rem;
      text-align: left;
    }
    .result-detail-card b {
      font-size: 1.3rem;
    }
    .result-detail-card i {
      display: block;
      margin-top: 8px;
      color: #4a2e12;
    }

    @media (max-width: 800px) {
      .quiz-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="royal-chest" id="royalChest">
  <div class="tsar-header">
    <div class="title-group">
      <span class="crown">👑</span>
      <h1 id="mainTitle">НИКОЛАЙ II</h1>
      <span class="crown">⚜️</span>
    </div>
    <div class="settings-btn" id="settingsBtn">⚙️</div>
  </div>

  <!-- сюда будем подгружать экраны -->
  <div id="appContent"></div>
</div>

<!-- модалка настроек (скрыта по умолчанию) -->
<div id="settingsModal" class="settings-modal" style="display: none;">
  <div class="settings-card">
    <h2>НАСТРОЙКИ</h2>
    <div class="font-controls">
      <button class="font-btn" id="fontMinus">A-</button>
      <button class="font-btn" id="fontPlus">A+</button>
    </div>
    <button class="close-settings" id="closeSettings">ЗАКРЫТЬ</button>
  </div>
</div>

<script>
  (function() {
    // данные вопросов
    const questionsData = [
      { q: "Какое хобби Николая II вызывало зависть у мужиков?", options: ["Игра в Fortnite", "Рубка дров", "Коллекционирование фантиков", "Вязание носков"], correct: 1, explanation: "Царь реально рубил дрова! Мужики обзавидовались." },
      { q: "Что Николай II и дочки любили делать летом в Крыму?", options: ["Зависать в TikTok", "Играть в теннис и купаться", "Грабить торговцев", "Загорать топлес"], correct: 1, explanation: "Теннис и море — царский активный отдых." },
      { q: "Какая порода собаки жила у Николая II?", options: ["Корги", "Мопс", "Хаски", "Такса"], correct: 0, explanation: "Корги были любимцами императрицы." },
      { q: "Что Николай подарил жене на Пасху?", options: ["Айфон", "Сертификат в СПА", "Яйцо Фаберже", "Носки с оленями"], correct: 2, explanation: "Яйцо Фаберже — скромный подарок на миллион." },
      { q: "Какую простую еду обожал император?", options: ["Доширак", "Гречку с котлетой", "Суши", "Картошку фри"], correct: 1, explanation: "Царь любил солдатскую кашу, свой в доску!" },
      { q: "Какая татуировка была у Николая II?", options: ["Дракон на руке", "Портрет Путина", "Надпись «Rammstein»", "Череп с костями"], correct: 0, explanation: "Дракона набили в Японии, ещё когда был наследником." },
      { q: "Какой транспорт предпочитал для дальних поездок?", options: ["Метро", "Императорский поезд", "Ламборгини", "Лошадь Пржевальского"], correct: 1, explanation: "У него был личный поезд — дворец на колёсах." },
      { q: "Какую музыку любил Николай II?", options: ["Моргенштерна", "Чайковского и оперу", "Шансон", "Техно"], correct: 1, explanation: "Царь ценил классику и сам играл на фортепиано." },
      { q: "Кто был лучшим другом семьи (все обсуждали)?", options: ["Киркоров", "Григорий Распутин", "Тимати", "Дед Мороз"], correct: 1, explanation: "Распутин — загадочный мужик, но царица ему верила." },
      { q: "За что получил прозвище «Миротворец»?", options: ["Мирил котиков", "Инициировал Гаагские конференции", "Пил мирный коктейль", "Премия мира"], correct: 1, explanation: "Хотел разоружить Европу, но не вышло." },
      { q: "Какое прозвище дали студенты за внешность?", options: ["Кудряш", "Ник Угрюмый", "Царь-батюшка с бородкой", "Бородач"], correct: 2, explanation: "Аккуратная бородка и добрый взгляд." },
      { q: "Что любил коллекционировать Николай II?", options: ["Фантики", "Фотографии", "Картины с голыми бабами", "Киндер-сюрпризы"], correct: 1, explanation: "Обожал фоткать и сниматься сам." },
      { q: "Сколько детей было в семье Николая II?", options: ["2", "5 (4 девочки и мальчик)", "10", "0 (чайлдфри)"], correct: 1, explanation: "Четыре красавицы-дочки и наследник Алексей." },
      { q: "Где любил проводить лето?", options: ["На Мальдивах", "В Петергофе или Ливадии", "В Турции", "В «Артеке»"], correct: 1, explanation: "Крым и Петергоф — царские резиденции." },
      { q: "Какой мог быть девиз в инстаграме?", options: ["Лайкни Россию", "Самодержавие, Православие, Народность", "Спасибо деду", "Кто не работает — тот ест"], correct: 1, explanation: "Официальный слоган империи." },
      { q: "Как Николай II относился к спорту?", options: ["Лежал на диване", "Активно занимался: теннис, гребля", "Болел за «Спартак»", "Спорт — зло"], correct: 1, explanation: "Подтянутый, любил греблю и теннис." },
      { q: "Что он получил на коронацию (кроме Ходынки)?", options: ["Подписку Netflix", "Памятный рубль и кружку", "Путёвку в Сочи", "Пылесос"], correct: 1, explanation: "Всем дарили царские подарки." },
      { q: "Как развлекал дочерей?", options: ["Концерт Егора Крида", "Читал книги, играл в игры", "Давал деньги в ТЦ", "Запирал в подвал"], correct: 1, explanation: "Семейные вечера с книгами — святое." },
      { q: "В каком городе родился Николай II?", options: ["Москва", "Царское Село (Пушкин)", "Нью-Йорк", "Сочи"], correct: 1, explanation: "Питерский парень." },
      { q: "Что Николай II больше всего ценил в людях?", options: ["Умение делать селфи", "Верность и честность", "Толстый кошелёк", "Знание мемов"], correct: 1, explanation: "Ценил преданность, как настоящий император." }
    ];

    let userName = '';
    let userAnswers = new Array(20).fill(null);
    let quizCompleted = false;
    let fontSize = 100; // процент

    const app = document.getElementById('appContent');
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettings = document.getElementById('closeSettings');
    const fontPlus = document.getElementById('fontPlus');
    const fontMinus = document.getElementById('fontMinus');
    const root = document.documentElement;

    // настройки шрифта - изменяем CSS-переменную, влияющую на всё
    function changeFontSize(delta) {
      fontSize = Math.min(150, Math.max(70, fontSize + delta));
      root.style.setProperty('--font-scale', fontSize + '%');
    }
    
    fontPlus.addEventListener('click', () => changeFontSize(10));
    fontMinus.addEventListener('click', () => changeFontSize(-10));
    settingsBtn.addEventListener('click', () => settingsModal.style.display = 'flex');
    closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');
    window.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.style.display = 'none';
    });

    // экран ввода имени
    function showNameScreen() {
      app.innerHTML = `
        <div class="name-screen">
          <h2>⚜️ ПРЕДСТАВЬТЕСЬ ⚜️</h2>
          <input type="text" id="userNameInput" class="name-input" placeholder="Ваше имя" autocomplete="off">
          <button class="name-btn" id="startQuizBtn">ВОЙТИ</button>
        </div>
      `;
      document.getElementById('startQuizBtn').addEventListener('click', () => {
        const name = document.getElementById('userNameInput').value.trim();
        if (name) {
          userName = name;
          showQuiz();
        } else {
          alert('Царь требует имя!');
        }
      });
    }

    // показать викторину
    function showQuiz() {
      quizCompleted = false;
      userAnswers = new Array(20).fill(null);
      renderQuizGrid();
    }

    // рендер сетки вопросов
    function renderQuizGrid() {
      let html = `<div class="quiz-grid">`;
      for (let i = 0; i < questionsData.length; i++) {
        const q = questionsData[i];
        html += `<div class="card" data-qidx="${i}">`;
        html += `<div class="question-text">${i+1}. ${q.q}</div>`;
        html += `<div class="answers">`;
        for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
          const checked = (userAnswers[i] === optIdx) ? 'checked' : '';
          html += `
            <label class="answer-option">
              <input type="radio" name="q${i}" value="${optIdx}" ${checked} data-q="${i}" data-opt="${optIdx}">
              <span>${q.options[optIdx]}</span>
            </label>
          `;
        }
        html += `</div></div>`;
      }
      html += `</div>`;
      html += `<div class="score-panel"><div class="score-text">⚜️ ОТВЕЧЕНО: ${userAnswers.filter(a => a !== null).length}/20</div><button class="check-btn" id="showResultsBtn">⚜️ ИТОГИ ⚜️</button></div>`;
      app.innerHTML = html;

      // обработчики радио
      document.querySelectorAll('input[type=radio]').forEach(radio => {
        radio.addEventListener('change', function(e) {
          const qIdx = parseInt(this.dataset.q);
          const optIdx = parseInt(this.dataset.opt);
          userAnswers[qIdx] = optIdx;
          document.querySelector('.score-text').innerHTML = `⚜️ ОТВЕЧЕНО: ${userAnswers.filter(a => a !== null).length}/20`;
        });
      });

      document.getElementById('showResultsBtn').addEventListener('click', showResults);
    }

    // показать результаты
    function showResults() {
      const answered = userAnswers.filter(a => a !== null).length;
      if (answered < 20) {
        alert(`Ответь на все вопросы, ${userName}! Осталось ${20 - answered}`);
        return;
      }

      let correctCount = 0;
      let resultsHTML = `<div class="result-screen"><h2 class="result-title">⚜️ ВЕРДИКТ, ${userName} ⚜️</h2>`;

      for (let i = 0; i < questionsData.length; i++) {
        const q = questionsData[i];
        const userAns = userAnswers[i];
        const isCorrect = (userAns === q.correct);
        if (isCorrect) correctCount++;
        const correctText = q.options[q.correct];
        const userText = q.options[userAns];
        const expl = q.explanation;
        const mark = isCorrect ? '✅' : '❌';
        resultsHTML += `<div class="result-detail-card">
          <b>${i+1}. ${q.q}</b><br>${mark} Ты выбрал: ${userText}<br>⚜️ Правильно: ${correctText}<br><i>${expl}</i>
        </div>`;
      }

      const percent = (correctCount / 20) * 100;
      let finalMessage = '';
      if (percent >= 90) {
        finalMessage = `👑 ${userName}, Николай Второй дружил бы с вами! 👑`;
      } else {
        finalMessage = `⚜️ ${userName}, ты неплохо знаешь царя, но есть нюансы...`;
      }

      resultsHTML += `<div class="result-stats">Правильных ответов: ${correctCount}/20 (${percent}%)</div>`;
      resultsHTML += `<div class="result-message">${finalMessage}</div>`;
      resultsHTML += `<button class="restart-btn" id="restartBtn">⚜️ ЗАНОВО ⚜️</button>`;
      resultsHTML += `</div>`;

      app.innerHTML = resultsHTML;
      document.getElementById('restartBtn').addEventListener('click', () => {
        userName = '';
        showNameScreen();
      });
      quizCompleted = true;
    }

    // старт
    showNameScreen();
  })();
</script>
</body>
</html>
